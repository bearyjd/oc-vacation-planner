<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #1A3A6B;
      margin-bottom: 12px;
    }
    .count {
      font-size: 28px;
      font-weight: 700;
      color: #1A3A6B;
      text-align: center;
      margin: 8px 0 4px;
    }
    .label {
      text-align: center;
      color: #666;
      font-size: 11px;
      margin-bottom: 16px;
    }
    .buttons {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
    button:disabled { opacity: 0.4; cursor: default; }
    #downloadBtn {
      background: #1A3A6B;
      color: #fff;
    }
    #clearBtn {
      background: #e8e8e8;
      color: #444;
    }
    .status {
      text-align: center;
      font-size: 11px;
      color: #888;
      margin-top: 10px;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <h1>VPlan Chase Capture</h1>
  <div class="count" id="count">--</div>
  <div class="label">API responses captured</div>
  <div class="buttons">
    <button id="downloadBtn">Download JSON</button>
    <button id="clearBtn">Clear</button>
  </div>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
